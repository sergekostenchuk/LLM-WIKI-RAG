name: Bug report
description: Report a reproducible defect
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, private documents, or sensitive run reports.
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: 1.0.1
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: macOS 15, Python 3.12, Node 20
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide minimal, redacted commands and fixture content.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
