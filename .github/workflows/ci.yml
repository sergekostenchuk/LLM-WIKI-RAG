name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} · Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - run: npm ci
      - run: npm test

  package:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: npm ci
      - run: npm pack
      - run: npm run build:skill
      - uses: actions/upload-artifact@v4
        with:
          name: release-candidates
          path: |
            *.tgz
            dist/*.skill
